- name: Create workers instances 
  hosts: localhost 
  become: true 
  vars_files: 
    - ../vars/machines.yaml 
  tasks: 
    # tasks for only create the master instance 
    - name: Install Python packages via apt
      apt:
        name:
          - python3-requests
          - python3-google-auth
        state: present
        update_cache: yes
      when: false 

    - name: Loop to show machines specs
      debug: 
        msg: |
          Machine Name: {{ item.name }}
      loop: "{{ machines_info }}"
      when: true 

    - name: Slurp pub key from local machine
      slurp:
        src: "{{ ssh_pubkey_path }}"
      register: ssh_pubkey
      when: true 

    - name: Create GCP instance
      google.cloud.gcp_compute_instance:
        name: "{{ item.name }}"
        machine_type: "{{ item.machine_type }}"
        zone: "{{ item.zone }}"
        project: "{{google_project_id}}"
        auth_kind: application
        #auth_kind: "serviceaccount"
        #service_account_file: "{{ service_account_path }}"
        state: present # absent -> delete instance 
        metadata:
          ssh-keys: "{{agent_user}}:{{ ssh_pubkey['content'] | b64decode }}"

        disks:
          - auto_delete: true
            boot: true
            initialize_params:
              source_image: "{{ item.image }}"
              disk_size_gb: "{{ item.disk_size }}"
              disk_type: "{{ item.disk_type }}"
        network_interfaces:
          - network:
              selfLink: "projects/{{google_project_id}}/global/networks/default"
           # make sure that you already reserved the ip address inside the google console
            access_configs:
              - name: External NAT
                type: ONE_TO_ONE_NAT
                nat_ip: 
                  address: "{{ reserved_ips[item.name] }}"
        tags:
          items:
            - http-server
            - https-server
      environment: 
        GOOGLE_APPLICATION_CREDENTIALS: "{{ adc_file }}" 
      loop: "{{ machines_info }}" 
      register: gcp_workers_instances
      # only run this for the workers machines 
      when: item.name not in ["master02","master03"] 
    # Error in getting the first values  results 
    - name: Write gcp_instances into json file
      copy:
        content: "{{ gcp_workers_instances }}"
        dest: "./gcp_workers_instances.json"
      when: true
    #  store the existing inventory configuration to the variable
    - name: Register the existing inventory file 
      slurp:
        src: "../inventory.ini"
      register: existing_inventory 
    - name: Update our inventory 
      template: 
        src: "../templates/worker-template.j2"
        dest: "../inventory.ini"
      vars:
        existing_content: "{{ existing_inventory['content'] | b64decode }}"
