apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-dpl
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: demo-recreate
  template:
    metadata:
      labels:
        app: demo-recreate
    spec:
      containers:
      - name: myapp-cont
        image: 69966/earthdx:78
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-svc
spec:
  selector:
    app: demo-recreate
  ports:
  - port: 80
    targetPort: 80
