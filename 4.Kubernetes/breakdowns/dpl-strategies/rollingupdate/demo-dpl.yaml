apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-dpl
spec:
  replicas: 4

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  selector:
    matchLabels:
      app: demo-rolling

  template:
    metadata:
      labels:
        app: demo-rolling

    spec:
      containers:
      - name: myapp-cont
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
spec:
  selector:
    app: demo-rolling
  ports:
  - port: 80
    targetPort: 80
